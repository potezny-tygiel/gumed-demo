server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Security headers ────────────────────────────────────────────────
    add_header X-Frame-Options        "DENY"                          always;
    add_header X-Content-Type-Options "nosniff"                       always;
    add_header X-XSS-Protection       "1; mode=block"                 always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Reverse-proxy API requests to the backend service ───────────────
    # API_UPSTREAM is replaced at container startup by entrypoint.sh.
    # We use a variable so nginx re-resolves DNS on every request instead
    # of caching the IP at startup (which causes 502 if the API starts later).
    resolver KUBE_DNS_IP valid=5s ipv6=off;
    resolver_timeout 5s;
    set $api_backend "http://API_UPSTREAM";

    location /api/ {
        proxy_pass         $api_backend$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Serve static files ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check for Kubernetes probes ──────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
