name: Build & Push Images

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "ingestion/**"
      - "frontend/**"
  workflow_dispatch:
    inputs:
      force_all:
        description: "Force rebuild all images"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # -----------------------------------------------------------------------
  # Detect which services have changed
  # -----------------------------------------------------------------------
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      ingestion: ${{ steps.changes.outputs.ingestion }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        run: |
          if [[ "${{ github.event.inputs.force_all }}" == "true" ]]; then
            echo "api=true" >> "$GITHUB_OUTPUT"
            echo "ingestion=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "Force rebuild: all services"
            exit 0
          fi

          # Compare with previous commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          if echo "$CHANGED" | grep -q "^api/"; then
            echo "api=true" >> "$GITHUB_OUTPUT"
            echo "Changed: api"
          else
            echo "api=false" >> "$GITHUB_OUTPUT"
            echo "Unchanged: api"
          fi

          if echo "$CHANGED" | grep -q "^ingestion/"; then
            echo "ingestion=true" >> "$GITHUB_OUTPUT"
            echo "Changed: ingestion"
          else
            echo "ingestion=false" >> "$GITHUB_OUTPUT"
            echo "Unchanged: ingestion"
          fi

          if echo "$CHANGED" | grep -q "^frontend/"; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "Changed: frontend"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
            echo "Unchanged: frontend"
          fi

  # -----------------------------------------------------------------------
  # Build & push only changed services
  # -----------------------------------------------------------------------
  build-api:
    name: Build API
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:latest

  build-ingestion:
    name: Build Ingestion
    needs: detect-changes
    if: needs.detect-changes.outputs.ingestion == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Ingestion image
        uses: docker/build-push-action@v6
        with:
          context: ./ingestion
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ingestion:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ingestion:latest

  build-frontend:
    name: Build Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest

  # -----------------------------------------------------------------------
  # Summary
  # -----------------------------------------------------------------------
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, build-api, build-ingestion, build-frontend]
    if: always()
    steps:
      - name: Report
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service    | Changed | Build |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| api        | ${{ needs.detect-changes.outputs.api }} | ${{ needs.build-api.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ingestion  | ${{ needs.detect-changes.outputs.ingestion }} | ${{ needs.build-ingestion.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| frontend   | ${{ needs.detect-changes.outputs.frontend }} | ${{ needs.build-frontend.result }} |" >> "$GITHUB_STEP_SUMMARY"

