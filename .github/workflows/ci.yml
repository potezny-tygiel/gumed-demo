name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, ingestion]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ${{ matrix.service }}/requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check ${{ matrix.service }}/

      - name: Type check with mypy
        run: mypy ${{ matrix.service }}/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, ingestion]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ${{ matrix.service }}/requirements.txt

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          python -m pytest tests/ -v --tb=short --junitxml=../test-results-${{ matrix.service }}.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: test-results-${{ matrix.service }}.xml

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        service: [api, ingestion]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: docker build -t medical-pipeline-${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint subcharts
        run: |
          helm lint helm/charts/postgresql
          helm lint helm/charts/api
          helm lint helm/charts/ingestion
          helm lint helm/charts/grafana

      - name: Build umbrella dependencies
        run: helm dependency build helm/

      - name: Lint umbrella chart
        run: helm lint helm/

      - name: Template dry-run
        run: |
          helm template test helm/ \
            --set api.image.repository=ghcr.io/test/api \
            --set api.image.tag=test \
            --set ingestion.image.repository=ghcr.io/test/ingestion \
            --set ingestion.image.tag=test \
            > /dev/null

