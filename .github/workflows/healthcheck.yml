name: Health Check

on:
  workflow_dispatch:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"

jobs:
  health:
    name: Cluster Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run health check via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR="/opt/medical-pipeline"

            # Update healthcheck script from repo
            cd "${REPO_DIR}"
            git fetch origin main
            git reset --hard origin/main

            chmod +x "${REPO_DIR}/infra/healthcheck.sh"
            "${REPO_DIR}/infra/healthcheck.sh"

