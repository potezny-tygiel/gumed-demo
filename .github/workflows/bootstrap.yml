name: Bootstrap VPS

on:
  workflow_dispatch:
    inputs:
      vps_host:
        description: "VPS IP address or hostname (overrides VPS_HOST secret)"
        required: false

jobs:
  bootstrap:
    name: Bootstrap K3s on VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine VPS host
        id: vps
        run: |
          HOST="${{ github.event.inputs.vps_host }}"
          if [[ -z "${HOST}" ]]; then
            HOST="${{ secrets.VPS_HOST }}"
          fi
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"

      - name: Run bootstrap script on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ steps.vps.outputs.host }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            export REPO_URL="https://github.com/${{ github.repository }}.git"
            sudo -E bash -s < /dev/stdin << 'BOOTSTRAP'
            $(cat infra/bootstrap.sh)
            BOOTSTRAP

      - name: Verify K3s
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ steps.vps.outputs.host }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Node Status ==="
            kubectl get nodes
            echo ""
            echo "=== Namespaces ==="
            kubectl get namespaces
            echo ""
            echo "=== Helm Version ==="
            helm version --short

