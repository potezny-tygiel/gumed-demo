apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.fullname" . }}-dashboard-provider
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: Default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
