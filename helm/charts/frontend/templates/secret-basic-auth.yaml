{{- if .Values.basicAuth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "frontend.fullname" . }}-basic-auth
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
type: Opaque
data:
  # htpasswd format: <user>:<bcrypt-hash>
  # Generated at deploy time via --set frontend.basicAuth.htpasswd
  auth: {{ .Values.basicAuth.htpasswd | b64enc }}
{{- end }}
