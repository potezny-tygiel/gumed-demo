image:
  repository: ""
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  host: hevelius.space
  tls: true
  annotations: {}

# In-cluster service name for the API reverse proxy
apiUpstream: ""

# HTTP Basic Auth (nginx ingress)
basicAuth:
  enabled: false
  # htpasswd-format string, e.g. "admin:$2y$05$..."
  htpasswd: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
