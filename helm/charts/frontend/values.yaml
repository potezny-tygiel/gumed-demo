image:
  repository: ""
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  host: hevelius.space
  tls: true
  annotations: {}

# In-cluster service name for the API reverse proxy
apiUpstream: ""

# HTTP Basic Auth (nginx ingress)
# The secret is created externally via kubectl in deploy.yml
basicAuth:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
