{{- /*
Allow frontend pods to receive traffic from the Ingress controller
and to connect to the API service.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
  labels:
    app.kubernetes.io/part-of: medical-pipeline
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
  egress:
    # → API service
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api
      ports:
        - port: 8000
          protocol: TCP
    # → DNS (CoreDNS)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
