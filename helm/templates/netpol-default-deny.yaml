{{- /*
Default-deny-all: drops all ingress/egress unless explicitly allowed.
Zero-trust baseline for the namespace.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  labels:
    app.kubernetes.io/part-of: medical-pipeline
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
