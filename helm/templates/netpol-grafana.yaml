{{- /*
Allow Grafana pods to receive HTTP from the Ingress controller
and to connect to PostgreSQL for datasource queries.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana
  labels:
    app.kubernetes.io/part-of: medical-pipeline
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 3000
          protocol: TCP
  egress:
    # → PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - port: 5432
          protocol: TCP
    # → DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
