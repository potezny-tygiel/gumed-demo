{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.issuerName | default "letsencrypt-prod" }}
  labels:
    app.kubernetes.io/part-of: medical-pipeline
spec:
  acme:
    server: {{ .Values.certManager.acmeServer | default "https://acme-v02.api.letsencrypt.org/directory" }}
    email: {{ .Values.certManager.email | quote }}
    privateKeySecretRef:
      name: {{ .Values.certManager.issuerName | default "letsencrypt-prod" }}
    solvers:
      - http01:
          ingress:
            class: nginx
{{- end }}
