# -- Global values shared across all subcharts
global:
  # -- Container image registry (e.g. ghcr.io/your-org)
  imageRegistry: ""
  # -- Image pull secrets for private registries
  imagePullSecrets: []

# -- cert-manager ClusterIssuer for Let's Encrypt TLS
certManager:
  enabled: true
  email: ""
  issuerName: letsencrypt-prod
  acmeServer: https://acme-v02.api.letsencrypt.org/directory

# -- PostgreSQL subchart values
postgresql:
  auth:
    username: pipeline
    password: changeme
    database: medical_data
  storage:
    size: 5Gi
    storageClass: local-path

# -- API subchart values
api:
  image:
    repository: ""
    tag: latest
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: true
    host: api.hevelius.space
    tls: true

# -- Ingestion subchart values (Kubernetes Job)
ingestion:
  image:
    repository: ""
    tag: latest
  kaggle:
    # -- Set via secrets; these are placeholders
    username: ""
    key: ""
    dataset: prasad22/healthcare-dataset

# -- Grafana subchart values
grafana:
  adminUser: admin
  adminPassword: admin
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    host: grafana.hevelius.space
    tls: true
  storage:
    size: 1Gi
    storageClass: local-path
  # Grafana's provisioned PostgreSQL datasource uses the same creds as the
  # postgresql subchart.  These defaults are overridden at deploy time via
  # --set grafana.postgresql.username / --set grafana.postgresql.password.
  postgresql:
    database: medical_data
    username: pipeline
    password: changeme

# -- Frontend subchart values
frontend:
  image:
    repository: ""
    tag: latest
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    host: hevelius.space
    tls: true
